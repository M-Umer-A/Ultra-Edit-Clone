<!DOCTYPE html>
<html lang="en">

<head>

    <title>exercise7</title>
    <style>
        * {
            margin: 0px;
            padding: 0;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 1px;
            padding: 2px;
        }

        .logo img {
            width: 150px;
            height: 50px;

        }

        .list ul {
            list-style: none;
            display: flex;
            gap: 35px;
            align-items: center;
        }

        .list ul li {
            display: flex;
            align-items: center;

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .list ul li svg {
            margin-left: 5px;
            vertical-align: middle;
        }

        .banner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px;
            padding-top: 40px;
        }

        .banner span {
            font-size: 35px;
            padding: 20px;
            margin: 10px;
        }

        .banner .para {
            font-size: 20px;
            padding: 20px;
            margin: 5px;
        }

        .banbutton button {
            background-color: rgb(97, 203, 238);
            color: white;
            border: none;
            padding: 10px;
            margin-top: auto;
            cursor: pointer;
        }

        .container {
            width: 80vw;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            /* Three equal columns */
            grid-template-rows: repeat(3, 1fr);
            /* Three equal rows */
            grid-gap: 20px;
            /* Space between grid items */
            margin: 0 auto;
            /* Center the container horizontally */
            padding: 20px;
            /* Add some padding around the container */
            box-sizing: border-box;
            /* Include padding and border in the element's total width and height */
            padding-top: 145px;
        }

        .item {
            border: 5px solid black;
            height: 115px;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
        }

        .download-button {
            background-color: rgb(97, 203, 238);
            color: white;
            border: none;
            padding: 10px;
            margin-top: auto;
            cursor: pointer;
        }

        .button :nth-child(1) {
            background-color: lightgreen;
            color: white;


        }
    </style>
</head>
